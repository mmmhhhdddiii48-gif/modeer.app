services:
  - type: web
    name: nukhba-api
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: npm run start
    healthCheckPath: /health
    disk:
      name: nukhba-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_VERSION
        value: 22.16.0
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: DB_FILE
        value: /var/data/nukhba.sqlite
      - key: CORS_ORIGIN
        value: '*'
      - key: AUTH_TOKEN_SECRET
        generateValue: true
      - key: AUTH_TOKEN_EXPIRES_IN
        value: 8h
